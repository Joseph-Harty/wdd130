<!DOCTYPE html>
<html lang="en">
<head>

    <header>

            <img src="harty.png" alt="Harty Logo" class="logo" id="main-logo" onclick="spinLogo()">
            
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-btn">Home</a></li>
                    <li><a href="wwr/index.html" class="nav-btn">WWR</a></li>

    <main>
        <section id="hero">
            <img src="images/military-hero.jpg" alt="Joe Harty Military Focused" class="hero-img">

        <section id="features">
            <div class="feature-box">
                <img src="images/church.jpg" alt="Faith">

            </div>
            <div class="feature-box">

</section>

        <div class="socials">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </div>
    </footer>

    <script>
    function spinLogo() {
        const logo = document.getElementById('main-logo');
        logo.classList.remove('spinning');
        void logo.offsetWidth; // Reset animation
        logo.classList.add('spinning');
    }
    </script>
